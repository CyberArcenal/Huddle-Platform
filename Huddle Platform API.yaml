    UserTrend:
      type: object
      properties:
        date:
          type: string
          format: date
        value:
          type: integer
      required:
      - date
      - value
    ValidationErrorResponse:
      type: object
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required:
      - errors
    Verify2FARequestRequest:
      type: object
      properties:
        checkpoint_token:
          type: string
          minLength: 1
        otp_code:
          type: string
          minLength: 1
          maxLength: 6
      required:
      - checkpoint_token
      - otp_code
    Verify2FAResponse:
      type: object
      properties:
        status:
          type: boolean
        user:
          $ref: '#/components/schemas/UserProfile'
        refreshToken:
          type: string
        accessToken:
          type: string
        expiresIn:
          type: integer
        message:
          type: string
      required:
      - accessToken
      - expiresIn
      - message
      - refreshToken
      - status
      - user
    WarnUserInputRequest:
      type: object
      properties:
        user_id:
          type: integer
        reason:
          type: string
          minLength: 1
          maxLength: 500
        severity:
          allOf:
          - $ref: '#/components/schemas/SeverityEnum'
          default: low
      required:
      - reason
      - user_id
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
