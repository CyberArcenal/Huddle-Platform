components:
  schemas:
    ActivitySummary:
      type: object
      description: Serializer for user activity summary/statistics
      properties:
        total_activities:
          type: integer
        last_activity:
          type: string
          format: date-time
        activities_by_type:
          type: object
          additionalProperties: {}
        activities_today:
          type: integer
        activities_this_week:
          type: integer
      required:
      - activities_by_type
      - activities_this_week
      - activities_today
      - last_activity
      - total_activities
    AdminLogDisplay:
      type: object
      description: Detailed view for a single admin log entry.
      properties:
        id:
          type: integer
          readOnly: true
        admin_user:
          allOf:
          - $ref: '#/components/schemas/UserMinimal'
          readOnly: true
        target_user:
          allOf:
          - $ref: '#/components/schemas/UserMinimal'
          readOnly: true
        action:
          $ref: '#/components/schemas/AdminLogDisplayActionEnum'
        target_id:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        reason:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - reason
    AdminLogDisplayActionEnum:
      enum:
      - user_ban
      - user_warn
      - post_remove
      - group_remove
      - content_review
      type: string
      description: |-
        * `user_ban` - User Ban
        * `user_warn` - User Warning
        * `post_remove` - Post Removal
        * `group_remove` - Group Removal
        * `content_review` - Content Review
    AdminStatistics:
      type: object
      properties:
        period_days:
          type: integer
        total_actions:
          type: integer
        action_breakdown:
          type: array
          items:
            type: object
            additionalProperties: {}
        admin_activity:
          type: array
          items:
            type: object
            additionalProperties: {}
        top_targets:
          type: array
          items:
            type: object
            additionalProperties: {}
        recent_actions:
          type: array
          items:
            type: object
            additionalProperties: {}
        daily_activity:
          type: array
          items:
            type: object
            additionalProperties: {}
        most_active_day:
          type: object
          additionalProperties: {}
          nullable: true
        avg_actions_per_day:
          type: number
          format: double
      required:
      - action_breakdown
      - admin_activity
      - avg_actions_per_day
      - daily_activity
      - most_active_day
      - period_days
      - recent_actions
      - top_targets
      - total_actions
    AdminUserCreateRequest:
      type: object
      description: Admin serializer for creating users
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 8
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        date_of_birth:
          type: string
          format: date
          nullable: true
        phone_number:
          type: string
          maxLength: 15
        bio:
          type: string
          maxLength: 500
        is_verified:
          type: boolean
        status:
          allOf:
          - $ref: '#/components/schemas/Status040Enum'
          description: |-
            Account status

            * `active` - Active
            * `restricted` - Restricted
            * `suspended` - Suspended
            * `deleted` - Deleted
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        send_welcome_email:
          type: boolean
          default: false
          description: Send welcome email to new user
      required:
      - password
      - username
    AdminUserList:
      type: object
      description: Admin serializer for listing users with additional admin info
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        date_of_birth:
          type: string
          format: date
          nullable: true
        phone_number:
          type: string
          maxLength: 15
        location:
          type: string
          nullable: true
          maxLength: 200
        bio:
          type: string
          maxLength: 500
        is_verified:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        profile_picture_url:
          type: string
          nullable: true
          description: Get full URL for profile picture
          readOnly: true
        cover_photo_url:
          type: string
          nullable: true
          description: Get full URL for cover photo
          readOnly: true
        followers_count:
          type: integer
          description: Get number of followers
          readOnly: true
        following_count:
          type: integer
          description: Get number of users being followed
          readOnly: true
        is_following:
          type: boolean
          description: Check if requesting user is following this user
          readOnly: true
        posts_count:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/Status040Enum'
          readOnly: true
          description: |-
            Account status

            * `active` - Active
            * `restricted` - Restricted
            * `suspended` - Suspended
            * `deleted` - Deleted
        last_login:
          type: string
          format: date-time
          readOnly: true
